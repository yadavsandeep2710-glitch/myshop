<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your cart — AromaHaven premium diffusers.">
  <title>Cart | AromaHaven</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="header" id="header">
    <nav class="nav container">
      <a href="index.html" class="logo">🌿 AromaHaven</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#products">Products</a></li>
        <li><a href="index.html#benefits">Benefits</a></li>
        <li><a href="index.html#reviews">Reviews</a></li>
        <li>
          <a href="cart.html" class="cart-link">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121 0 2.002-.881 1.745-1.97l-1.657-7.03A1.125 1.125 0 0 0 17.963 4.5H7.5m0 9.75L5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z"/>
            </svg>
            <span class="cart-count" id="cartCount">0</span>
          </a>
        </li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </nav>
  </header>

  <!-- ========== CART ========== -->
  <section class="page-header">
    <div class="container">
      <h1 class="section-title">Your Cart</h1>
      <p class="section-subtitle">Review your selected items before checkout.</p>
    </div>
  </section>

  <section class="cart-container">
    <div class="container">
      <div id="cartContent">
        <!-- Populated by JS -->
      </div>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <span class="toast-icon">✅</span>
    <span class="toast-msg" id="toastMsg">Item removed!</span>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container footer-content">
      <p>© 2026 AromaHaven. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
